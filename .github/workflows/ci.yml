name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Debug

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check clang-format
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '18'
          fallback-style: LLVM

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        exclude:
          - os: macos-latest
            build_type: Release
          - os: windows-latest
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_SHARED_LIBS=ON
          -DINFRA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel "$(nproc)"

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Configure (ASan)
        run: cmake -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DINFRA_SANITIZE_ADDRESS=ON
      - name: Build (ASan)
        run: cmake --build build-asan
      - name: Configure (UBSan)
        run: cmake -B build-ubsan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DINFRA_SANITIZE_UNDEFINED=ON
      - name: Build (UBSan)
        run: cmake --build build-ubsan